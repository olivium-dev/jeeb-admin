name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.18"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint
        continue-on-error: false

      - name: Test
        run: npm test -- --reporter=default

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://staging-gateway.jeeb.io
          VITE_ENV: staging
